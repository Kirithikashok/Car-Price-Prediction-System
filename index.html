<!DOCTYPE html>
<html>
<head>
    <title>Car Price Predictor</title>
</head>
<body>

<h2>🚗 Car Price Prediction</h2>

<form action="/predict" method="POST">

Vehicle Age:
<input type="number" name="vehicle_age" required><br><br>

KM Driven:
<input type="number" name="km_driven" required><br><br>

Mileage:
<input type="number" step="0.1" name="mileage" required><br><br>

Engine:
<input type="number" name="engine" required><br><br>

Max Power:
<input type="number" step="0.1" name="max_power" required><br><br>

Seats:
<input type="number" name="seats" required><br><br>

<!-- Seller -->
Seller:
<select name="seller_type">
    <option value="Dealer">Dealer</option>
    <option value="Individual">Individual</option>
    <option value="Trustmark Dealer">Trustmark Dealer</option>
</select>
<br><br>

<!-- Fuel -->
Fuel:
<select name="fuel_type">
    <option value="Petrol">Petrol</option>
    <option value="Diesel">Diesel</option>
    <option value="CNG">CNG</option>
    <option value="LPG">LPG</option>
</select>
<br><br>

<!-- Transmission -->
Transmission:
<select name="transmission_type">
    <option value="Manual">Manual</option>
    <option value="Automatic">Automatic</option>
</select>
<br><br>

<button type="submit">Predict Price</button>

</form>

<!-- ✅ Prediction result -->
<h3>{{ prediction_text }}</h3>

</body>
</html>
